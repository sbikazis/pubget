# زيادة الذاكرة للـ Gradle JVM
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx4G

# استخدام AndroidX
android.useAndroidX=true

# تحسين سرعة بناء Gradle
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.daemon=true

# تعطيل التحذيرات المتعلقة بالخيارات القديمة
# (لتجنب ظهور تحذيرات obsolete source/target)
kotlin.compiler.execution.strategy=in-process