workflows:
  android-apk:
    name: Build APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Clean Flutter
        script: flutter clean
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --target-platform android-arm,android-arm64 --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
