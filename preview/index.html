<!DOCTYPE html><html dir="rtl"><head><meta charset="utf-8"><title>Pubget</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>body{font-family:sans-serif;background:#0f0f0f;color:#fff;text-align:center;padding:40px}img{width:110px;height:110px;border-radius:20px;object-fit:cover}.btn{display:block;margin:14px auto;padding:14px;background:#7c3aed;color:#fff;border-radius:12px;text-decoration:none;max-width:320px}</style>
</head><body>
<img id="img"><h2 id="name">...</h2><p id="desc"></p>
<a id="open" class="btn">افتح في التطبيق</a>
<a href="https://play.google.com/store/apps/details?id=com.sbikazis.pubget" class="btn" style="background:#222">حمّل التطبيق</a>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAB0_LHzrG8A8NVg8l-SgdySHJM4KkE8",
  authDomain: "pubget-aaf27.firebaseapp.com",
  projectId: "pubget-aaf27",
  storageBucket: "pubget-aaf27.firebasestorage.app",
  messagingSenderId: "462313838148",
  appId: "1:462313838148:web:b7f8f0ba48728b8dc4c211"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const id = location.pathname.split('/').pop();
document.getElementById('open').href = location.origin + '/open?id=' + id;
db.collection('groups').doc(id).get().then(d=>{if(d.exists){const g=d.data();document.getElementById('name').textContent=g.name||'مجموعة';document.getElementById('desc').textContent=g.slogan||g.description||'';document.getElementById('img').src=g.imageUrl||'';document.title=g.name}});
</script></body></html>
